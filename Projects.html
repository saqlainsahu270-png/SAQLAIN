<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Projects | Saqlain</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #fbbf24;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top right, #1e1b4b, #020617 60%);
            color: #ffffff;
            font-family: 'impact', sans-serif;
            overflow-x: hidden;
            line-height: 1.7;
            
        }

        header {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            padding: 10px 5%;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            font-weight: 800;
            color: darkred;
            font-size: clamp(24px, 5vw, 40px);
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
        }
         .project-container {
            max-width: 1200px;
            margin: 140px auto 80px; 
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            grid-gap: 30px;
        }

        .card {
            text-decoration: none;
            display: block;
            border-radius: 15px;
            overflow: hidden;
            background: var(--glass);
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(251, 191, 36, 0.2);  
            border-color: var(--accent-color);
        }

        .card img {
            width: 100%;
            aspect-ratio: 16 / 10;
            object-fit: cover;
            display: block;
        }
        .footer-nav {
            margin-top: 50px;
            margin-bottom: 60px;
            display: flex;
            justify-content: center;
        }

        .btn-home {
            position: relative;
            padding: 15px 45px;
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            text-decoration: none;
            font-family: Orbitron;
            font-weight: 1200;
            border-radius: 10px;
            overflow: hidden;
            z-index: 1;
            max-width: 300px;
            font-style: bold;
        }

        .btn-home:hover {
            color: #000;
            background: var(--accent-color);
            box-shadow: 0 0 40px rgba(251, 191, 36, 0.4);
            transform: translateY(-5px);
            font-weight: 1200;
        }

        
        @media (max-width: 768px) {
            header { padding: 10px 15px; }
            
            nav { display: block; } 
            nav ul { gap: 15px; }

            .project-container {
                grid-template-columns: 1fr; 
                margin-top: 100px;
            }
            
            .logo-text { font-size: 20px; }
        }
        .btn-home { width: 100%; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <a href="Home.html" class="logo-text">SAQ<span style="color: black">LAIN</span></a>
    </div>
</header>

<main class="project-container">
    <a href="1.html" class="card"><img src="1.png" alt="Project 1"></a>
    <a href="2.html" class="card"><img src="2.png" alt="Project 2"></a>
    <a href="3.html" class="card"><img src="3.png" alt="Project 3"></a>
    <a href="4.html" class="card"><img src="4.png" alt="Project 4"></a>
    <a href="5.html" class="card"><img src="5.png" alt="Project 5"></a>
    <a href="6.html" class="card"><img src="6.png" alt="Project 6"></a>
    <a href="7.html" class="card"><img src="7.png" alt="Project 7"></a>
    <a href="8.html" class="card"><img src="8.png" alt="Project 7"></a>
</main>
 <div class="footer-nav">
                <a href="Home.html" class="btn-home">BACK TO HOME</a>
            </div>
</body>
</html>
