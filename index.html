<!DOCTYPE html>
<html>
<head>
	<title>Start</title>
</head>

<style>
        :root {
            --primary: #ffde00; /* Vibrant Yellow */
            --secondary: #ff00ff; /* Neon Magenta */
            --bg-dark: #020617;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }

        body {
            background-color: var(--bg-dark);
            background: radial-gradient(circle at top right, #1e1b4b, #020617 60%);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        
        #splash {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        #splash h1 { 
            font-family: 'Orbitron'; 
            font-size: clamp(2.5rem, 12vw, 6rem); 
            color: var(--primary);
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(255, 222, 0, 0.5);
        }

        .splash-btn { 
            margin-top: 40px; 
            padding: 20px 50px; 
            background: var(--primary);
            color: #000; 
            border-radius: 4px;
            font-weight: 900; 
            cursor: pointer; 
            border: none; 
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
            text-decoration: none;
        }

        .splash-btn:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 10px 30px rgba(255, 222, 0, 0.4); }
        </style>
<body>
<div id="splash">
    <h1>SAQLAIN</h1>
    <p style="letter-spacing: 5px; opacity: 0.7;">STRATEGY × DESIGN</p>
    <a href="Home.html" class="splash-btn">Explore Portfolio</a>
    
</div>

</body>
</html>
